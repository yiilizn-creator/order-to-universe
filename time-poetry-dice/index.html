<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="随机六个词，拼出一句意想不到的话。" />
    <meta name="theme-color" content="#FAFAFA" />
    <meta property="og:title" content="时间的诗" />
    <meta property="og:description" content="随机六个词，拼出一句意想不到的话。" />
    <meta property="og:type" content="website" />
    <title>时间的诗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <canvas id="stars" aria-hidden="true"></canvas>
    <div class="aurora" aria-hidden="true"></div>

    <div id="app">
      <!-- 首页 -->
      <section class="screen screen--active" data-screen="home">
        <div class="screen-content home-content">
          <p class="logo reveal">时间的诗</p>
          <div class="home-spacer reveal" aria-hidden="true"></div>
          <div class="home-main reveal">
            <h1 class="hero-title">时间的诗</h1>
            <p class="hero-sub">随机六个词<br />拼出一句意想不到的话</p>
          </div>
          <div class="home-bottom reveal">
            <div class="dice-cluster" id="home-dice-cluster" aria-hidden="true"></div>
            <button class="btn btn-primary" type="button" data-action="start-roll">开始投掷</button>
          </div>
        </div>
      </section>

      <!-- 投掷页 -->
      <section class="screen" data-screen="roll">
        <div class="screen-content roll-content">
          <div class="dice-stage" id="roll-dice-stage"></div>
        </div>
      </section>

      <!-- 结果页 -->
      <section class="screen" data-screen="result">
        <div class="screen-content result-content">
          <div class="arrange-core reveal">
            <h2 class="module-title">你会怎么排列？</h2>
            <p class="module-hint">拖拽骰子，排出你的顺序</p>
            <div class="dice-row dice-row--draggable" id="result-dice-row"></div>
            <p class="custom-preview" id="custom-poem"></p>
            <button class="btn btn-soft" type="button" data-action="best-arrange">显示最佳排列</button>
          </div>

          <div class="best-panel" id="best-panel">
            <p class="best-loading" id="best-loading" hidden>正在寻找最合适的位置…</p>
            <p class="best-poem" id="best-poem"></p>
          </div>

          <div class="actions actions--result reveal">
            <button class="btn btn-primary" type="button" data-action="save-poster">保存图片</button>
            <button class="btn btn-secondary" type="button" data-action="roll-again">重新投掷</button>
            <button class="btn btn-ghost" type="button" data-action="share-friend">分享给朋友</button>
          </div>
        </div>
      </section>

      <!-- 分享页 -->
      <section class="screen" data-screen="share">
        <div class="screen-content share-content">
          <button class="share-back" type="button" data-action="back-result" aria-label="返回结果页">← 返回</button>
          <div class="poster-preview" id="poster-preview">
            <canvas id="poster-canvas"></canvas>
          </div>
          <div class="actions actions--share">
            <button class="btn btn-primary btn-block" type="button" data-action="download-poster">保存图片</button>
            <button class="btn btn-secondary btn-block" type="button" data-action="copy-share-text">复制文案</button>
          </div>
        </div>
      </section>
    </div>

    <p class="toast" id="toast" hidden></p>

    <div class="share-panel" id="share-panel" hidden>
      <div class="share-panel__backdrop" data-action="close-share"></div>
      <div class="share-panel__sheet" role="dialog" aria-label="分享">
        <p class="share-panel__title">分享给朋友</p>
        <div class="share-panel__options">
          <button class="share-option" type="button" data-action="share-copy-link">
            <span class="share-option__icon">🔗</span>
            <span class="share-option__label">复制链接</span>
          </button>
          <button class="share-option" type="button" data-action="share-copy-text">
            <span class="share-option__icon">📝</span>
            <span class="share-option__label">复制文案</span>
          </button>
        </div>
        <button class="share-panel__cancel" type="button" data-action="close-share">取消</button>
      </div>
    </div>

    <script defer src="./js/app.bundle.js"></script>
  </body>
</html>
